version: "3.8"

services:
  rust-builder-x64:
    build:
      context: .
      dockerfile: Dockerfile.x64
    platform: linux/amd64
    working_dir: /app
    volumes:
      - ..:/app
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
    environment:
      - CARGO_HOME=/usr/local/cargo
    tty: true
    stdin_open: true

volumes:
  cargo-registry:
  cargo-git:
